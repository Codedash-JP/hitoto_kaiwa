<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>大喜利育成ブラウザゲーム</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
        background: linear-gradient(#fff8eb 0%, #ffe8d0 45%, #f8d9ba 100%);
        color: #1f2937;
      }
      .container { width: min(960px, 100%); margin: 0 auto; padding: 16px; }
      h1 { margin: 0 0 8px; font-size: clamp(1.4rem, 4vw, 2rem); }
      .desc { margin: 0 0 14px; line-height: 1.6; color: #374151; font-size: 0.95rem; }
      .stage {
        position: relative;
        border-radius: 16px;
        padding: 16px;
        background: #f7efe4;
        border: 2px solid #d6b28f;
      }
      .characters { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
      .character {
        position: relative;
        min-height: 172px;
        border-radius: 12px;
        background: #fff;
        border: 1px solid #e5e7eb;
        padding: 8px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-end;
      }
      .avatar { font-size: clamp(2rem, 8vw, 3rem); }
      .name { margin-top: 6px; font-weight: 700; }
      .bubble {
        position: absolute;
        top: -8px;
        left: 50%;
        transform: translate(-50%, -100%);
        min-width: 120px;
        max-width: 190px;
        border-radius: 12px;
        padding: 8px 10px;
        background: #fff;
        border: 2px solid #cbd5e1;
        box-shadow: 0 6px 14px rgba(0,0,0,.12);
        font-size: 0.83rem;
        cursor: pointer;
      }
      .bubble.priority { border-color: #f97316; }
      .bubble:after {
        content: "";
        position: absolute;
        bottom: -8px;
        left: 50%;
        transform: translateX(-50%);
        border-left: 7px solid transparent;
        border-right: 7px solid transparent;
        border-top: 8px solid currentColor;
        color: inherit;
        opacity: 0.3;
      }
      .panel {
        margin-top: 16px;
        border-radius: 12px;
        background: #fff;
        border: 1px solid #e5e7eb;
        padding: 12px;
      }
      .log { min-height: 100px; max-height: 210px; overflow: auto; line-height: 1.6; font-size: 0.95rem; }
      .row { display: flex; gap: 8px; margin-top: 10px; }
      input[type="text"] {
        flex: 1; border: 1px solid #cbd5e1; border-radius: 8px; padding: 10px; font-size: 1rem;
      }
      button {
        border: 0; border-radius: 8px; padding: 10px 12px; background: #2563eb; color: #fff; font-weight: 700;
      }
      button.secondary { background: #6b7280; }
      .chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
      .chip { border-radius: 999px; background: #f3f4f6; padding: 6px 10px; font-size: .8rem; }
      @media (max-width: 760px) {
        .characters { grid-template-columns: repeat(2, 1fr); }
        .character { min-height: 150px; }
      }
    </style>
  </head>
  <body>
    <main class="container">
      <h1>大喜利育成ブラウザゲーム（笑点風）</h1>
      <p class="desc">吹き出しをクリックして会話開始。お題に回答すると「できてる / できてない」で評価され、キャラがリアクションします。ネタが集まるとメール送信確認が出ます。</p>
      <section class="stage" id="stage"></section>
      <section class="panel">
        <div id="status" class="log">開始するには、キャラの吹き出しをタップ / クリックしてください。</div>
        <div class="row">
          <input id="answerInput" type="text" placeholder="ここに大喜利の答えを書く" />
          <button id="sendBtn">回答する</button>
        </div>
        <div class="chips" id="chips"></div>
      </section>
    </main>

    <script>
      const chars = [
        { id: 1, name: "楽太", avatar: "🧑‍🎤", bubble: "今日の優先ネタあるよ！", priority: true },
        { id: 2, name: "小まり", avatar: "👩‍🎨", bubble: "大喜利、ひとつどう？", priority: false },
        { id: 3, name: "円ぞう", avatar: "🧔", bubble: "判定はわしに任せな。", priority: false },
        { id: 4, name: "なぎ", avatar: "👘", bubble: "新ネタはメモしてるよ。", priority: false }
      ];

      const state = { data: [], current: null, collected: 0 };
      const stage = document.getElementById('stage');
      const status = document.getElementById('status');
      const chips = document.getElementById('chips');
      const answerInput = document.getElementById('answerInput');
      const sendBtn = document.getElementById('sendBtn');

      function renderStage() {
        stage.innerHTML = `<div class="characters">${chars.map(c => `
          <article class="character">
            <button class="bubble ${c.priority ? 'priority' : ''}" data-char="${c.id}">${c.bubble}</button>
            <div class="avatar">${c.avatar}</div>
            <div class="name">${c.name}</div>
          </article>
        `).join('')}</div>`;

        stage.querySelectorAll('.bubble').forEach(btn => {
          btn.addEventListener('click', () => startConversation(Number(btn.dataset.char)));
        });
      }

      async function loadCsv() {
        const text = await fetch('./ogiri_data.csv').then(r => r.text());
        const rows = text.trim().split('\n');
        const headers = rows.shift().split(',');
        return rows.map(line => {
          const cols = line.split(',');
          return Object.fromEntries(headers.map((h, i) => [h, cols[i]]));
        });
      }

      function log(msg) {
        status.innerHTML += `<br>${msg}`;
        status.scrollTop = status.scrollHeight;
      }

      function pickOdai() {
        return state.data[Math.floor(Math.random() * state.data.length)];
      }

      function startConversation(charId) {
        const speaker = chars.find(c => c.id === charId);
        state.current = pickOdai();
        status.innerHTML = `【${speaker.name}】${speaker.bubble}<br>お題: 「${state.current.odai}」`;
        log('回答を入力して「回答する」を押してください。');
      }

      function evaluate(answer) {
        const lenScore = answer.length >= 10;
        const hasTwist = /え|逆|未来|突然|まさか|なのに|しかも/.test(answer);
        const ok = lenScore && hasTwist;
        return {
          ok,
          reason: ok ? '意外性と具体性があり、オチが見える！' : '短すぎるか、ひねりが弱いかも。',
          reaction: ok ? '👏「できてる！」座布団1枚！' : '😅「できてない！」もう一声！'
        };
      }

      function maybeAskMail() {
        if (state.collected >= 3) {
          const agree = confirm('新しいネタが3つ集まりました。メールで共有してもいいですか？');
          log(agree ? '📧 メール送信してOKとのこと！' : '✋ メール送信は見送りになりました。');
          state.collected = 0;
          chips.innerHTML = '';
        }
      }

      sendBtn.addEventListener('click', () => {
        if (!state.current) {
          log('先に吹き出しをクリックして会話を始めてください。');
          return;
        }
        const ans = answerInput.value.trim();
        if (!ans) {
          log('回答が空です。ひとこと入力してください。');
          return;
        }
        const result = evaluate(ans);
        log(`あなた: ${ans}`);
        log(`判定: ${result.ok ? 'できてる' : 'できてない'}（${result.reason}）`);
        log(`リアクション: ${result.reaction}`);
        state.collected += 1;
        const item = document.createElement('span');
        item.className = 'chip';
        item.textContent = `ネタ${state.collected}: ${state.current.odai}`;
        chips.appendChild(item);
        answerInput.value = '';
        maybeAskMail();
      });

      (async function init() {
        renderStage();
        state.data = await loadCsv();
        log(`CSV読込完了: ${state.data.length}件のお題（読み取り専用）`);
      })();
    </script>
  </body>
</html>
