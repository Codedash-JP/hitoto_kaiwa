<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tinder2</title>
    <style>
      :root {
        color-scheme: light;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
        background: radial-gradient(circle at top, #ffe9ef, #ffdfe8 40%, #f6f7fb 100%);
        color: #1f2937;
        padding: 16px;
      }

      .app {
        width: min(420px, 100%);
        display: grid;
        gap: 12px;
      }

      h1 {
        margin: 0;
        font-size: clamp(1.5rem, 5.5vw, 2rem);
      }

      p {
        margin: 0;
        color: #4b5563;
        line-height: 1.6;
        font-size: 0.95rem;
      }

      .card {
        position: relative;
        width: 100%;
        aspect-ratio: 3 / 4;
        border-radius: 24px;
        overflow: hidden;
        border: 1px solid #fecdd3;
        box-shadow: 0 18px 42px rgba(0, 0, 0, 0.15);
        background: #fff;
        cursor: pointer;
        user-select: none;
      }

      .card img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .stamp {
        position: absolute;
        left: 16px;
        top: 16px;
        border: 4px solid #facc15;
        color: #facc15;
        border-radius: 10px;
        font-size: clamp(2rem, 11vw, 3.2rem);
        font-weight: 800;
        line-height: 1;
        padding: 6px 14px;
        transform: rotate(-14deg) scale(0.6);
        opacity: 0;
      }

      .stamp.show {
        animation: pop-in 0.28s ease-out forwards;
      }

      .progress {
        color: #be123c;
        font-size: 0.95rem;
        font-weight: 700;
      }

      .done {
        display: none;
        background: #ffffffd9;
        border: 1px solid #fecdd3;
        border-radius: 16px;
        padding: 18px 14px;
        text-align: center;
      }

      .done button {
        margin-top: 12px;
        border: none;
        border-radius: 999px;
        background: #f43f5e;
        color: #fff;
        font-weight: 700;
        padding: 10px 16px;
        cursor: pointer;
      }

      @keyframes pop-in {
        from {
          opacity: 0;
          transform: rotate(-14deg) scale(0.6);
        }
        to {
          opacity: 1;
          transform: rotate(-14deg) scale(1);
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <h1>Tinder2</h1>
      <p>クリックのみで進行します。1回目のクリックで別バージョン、2回目で黄色スタンプ表示です。</p>
      <div id="progress" class="progress"></div>
      <div id="card" class="card" role="button" aria-label="カード">
        <img id="cardImage" alt="プロフィール画像" />
        <div id="stamp" class="stamp"></div>
      </div>
      <section id="done" class="done">
        <strong>すべて完了！</strong>
        <p>もう一度最初から見たい場合はリセットしてください。</p>
        <button id="resetBtn" type="button">最初から</button>
      </section>
    </main>

    <script>
      function makeSvgData(bgColor, title, subtitle) {
        const svg = `
<svg xmlns='http://www.w3.org/2000/svg' width='720' height='960' viewBox='0 0 720 960'>
  <defs>
    <linearGradient id='g' x1='0' y1='0' x2='1' y2='1'>
      <stop offset='0%' stop-color='${bgColor}'/>
      <stop offset='100%' stop-color='#111827'/>
    </linearGradient>
  </defs>
  <rect width='100%' height='100%' fill='url(#g)'/>
  <circle cx='360' cy='340' r='140' fill='rgba(255,255,255,0.18)'/>
  <rect x='170' y='520' rx='18' ry='18' width='380' height='150' fill='rgba(255,255,255,0.2)'/>
  <text x='360' y='575' text-anchor='middle' fill='#fff' font-size='54' font-family='sans-serif' font-weight='700'>${title}</text>
  <text x='360' y='640' text-anchor='middle' fill='#fde68a' font-size='36' font-family='sans-serif'>${subtitle}</text>
</svg>`;
        return `data:image/svg+xml;charset=utf-8,${encodeURIComponent(svg)}`;
      }

      const cards = [
        {
          normal: makeSvgData("#f43f5e", "画像1", "通常"),
          alt: makeSvgData("#e11d48", "画像2", "クリック後"),
          stamp: "A",
        },
        {
          normal: makeSvgData("#2563eb", "画像3", "通常"),
          alt: makeSvgData("#1d4ed8", "画像4", "クリック後"),
          stamp: "AA",
        },
        {
          normal: makeSvgData("#16a34a", "画像5", "通常"),
          alt: makeSvgData("#15803d", "画像6", "クリック後"),
          stamp: "AAA",
        },
      ];

      const cardEl = document.getElementById("card");
      const cardImageEl = document.getElementById("cardImage");
      const stampEl = document.getElementById("stamp");
      const doneEl = document.getElementById("done");
      const resetBtn = document.getElementById("resetBtn");
      const progressEl = document.getElementById("progress");

      const state = {
        index: 0,
        phase: "normal",
        locked: false,
      };

      function showCard() {
        if (state.index >= cards.length) {
          cardEl.style.display = "none";
          progressEl.textContent = "3 / 3 完了";
          doneEl.style.display = "block";
          return;
        }

        const current = cards[state.index];
        stampEl.className = "stamp";
        stampEl.textContent = "";
        cardEl.style.display = "block";
        doneEl.style.display = "none";

        if (state.phase === "normal") {
          cardImageEl.src = current.normal;
        } else {
          cardImageEl.src = current.alt;
        }

        progressEl.textContent = `${state.index + 1} / ${cards.length}`;
      }

      function nextCard() {
        state.index += 1;
        state.phase = "normal";
        state.locked = false;
        showCard();
      }

      cardEl.addEventListener("click", () => {
        if (state.locked || state.index >= cards.length) return;
        const current = cards[state.index];

        if (state.phase === "normal") {
          state.phase = "alt";
          cardImageEl.src = current.alt;
          return;
        }

        state.locked = true;
        stampEl.textContent = current.stamp;
        stampEl.classList.add("show");

        setTimeout(nextCard, 700);
      });

      resetBtn.addEventListener("click", () => {
        state.index = 0;
        state.phase = "normal";
        state.locked = false;
        showCard();
      });

      showCard();
    </script>
  </body>
</html>
