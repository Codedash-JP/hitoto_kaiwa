<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tinder2</title>
    <style>
      :root {
        color-scheme: light;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
        background: radial-gradient(circle at top, #ffe9ef, #ffdfe8 40%, #f6f7fb 100%);
        color: #1f2937;
      }

      .app {
        width: min(760px, 100%);
        margin: 0 auto;
        min-height: 100vh;
        padding: 16px;
        display: grid;
        gap: 12px;
      }

      h1 {
        margin: 0;
        font-size: clamp(1.4rem, 5vw, 2rem);
      }

      .controls {
        background: #ffffffdd;
        border: 1px solid #fecdd3;
        border-radius: 16px;
        padding: 12px;
        display: grid;
        gap: 10px;
      }

      .control-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
      }

      .upload-grid {
        display: grid;
        gap: 8px;
      }

      .upload-row {
        display: grid;
        grid-template-columns: 64px minmax(0, 1fr);
        align-items: center;
        gap: 8px;
      }

      .upload-label {
        font-weight: 700;
        color: #9f1239;
        font-size: 0.9rem;
      }

      .file-input {
        max-width: 100%;
      }

      button,
      select {
        border: none;
        border-radius: 999px;
        padding: 10px 14px;
        font-weight: 700;
        font-size: 0.95rem;
      }

      select {
        border: 1px solid #fda4af;
        background: #fff;
      }

      button {
        cursor: pointer;
      }

      .start {
        background: #f43f5e;
        color: #fff;
      }

      .stop {
        background: #111827;
        color: #fff;
      }

      .reset {
        background: #e5e7eb;
        color: #111827;
      }

      .stage-wrap {
        display: grid;
        place-items: center;
        background: #ffffffb5;
        border: 1px solid #ffd4df;
        border-radius: 18px;
        padding: 12px;
      }

      canvas {
        width: min(100%, 420px);
        aspect-ratio: 3 / 4;
        border-radius: 18px;
        touch-action: none;
        background: #fff;
      }

      .status,
      .tips,
      .progress {
        margin: 0;
        font-size: 0.92rem;
        color: #374151;
      }

      .progress {
        color: #be123c;
        font-weight: 700;
      }

      .download-link {
        display: inline-block;
        font-size: 0.92rem;
        color: #be123c;
        word-break: break-all;
      }
    </style>
  </head>
  <body>
    <main class="app">
      <h1>Tinder2</h1>

      <section class="controls">
        <div class="control-row">
          <span>画像アップロード(番号ごと):</span>
        </div>
        <div id="uploadGrid" class="upload-grid" aria-label="番号別画像アップロード"></div>
        <div class="control-row">
          <button id="clearImagesBtn" class="reset" type="button">画像をクリア</button>
        </div>
        <div class="control-row">
          <label for="frameSelect">表示開始:</label>
          <select id="frameSelect" aria-label="表示開始フレーム"></select>
          <button id="resetBtn" class="reset" type="button">最初から</button>
        </div>
        <div class="control-row">
          <button id="startRec" class="start" type="button">録画開始</button>
          <button id="stopRec" class="stop" type="button" disabled>録画終了</button>
        </div>
        <p id="progress" class="progress"></p>
        <p id="status" class="status"></p>
        <a id="download" class="download-link" hidden></a>
      </section>

      <section class="stage-wrap">
        <canvas id="stage" width="420" height="560" aria-label="Tinder2ステージ"></canvas>
      </section>

      <p class="tips">操作: 2枚目・4枚目・6枚目は左右スワイプ、その他はタップで次へ進みます。黄色文字は1回目=A、2回目=AA、3回目=AAAです。</p>
    </main>

    <script>
      const stage = document.getElementById("stage");
      const ctx = stage.getContext("2d");
      const uploadGrid = document.getElementById("uploadGrid");
      const clearImagesBtn = document.getElementById("clearImagesBtn");
      const frameSelect = document.getElementById("frameSelect");
      const resetBtn = document.getElementById("resetBtn");
      const startRecBtn = document.getElementById("startRec");
      const stopRecBtn = document.getElementById("stopRec");
      const progressEl = document.getElementById("progress");
      const statusEl = document.getElementById("status");
      const downloadEl = document.getElementById("download");

      const swipeOrder = [1, 3, 5];
      const swipeFrameIndexes = new Set(swipeOrder);
      const frames = ["#f43f5e", "#fb7185", "#2563eb", "#60a5fa", "#16a34a", "#4ade80", "#7c3aed"].map(
        (bg, i) => ({ bg, index: i })
      );

      const uploadedImages = new Array(frames.length).fill(null);
      const uploadedObjectUrls = new Array(frames.length).fill(null);

      const state = {
        index: 0,
        dragX: 0,
        dragY: 0,
        dragging: false,
        pointerId: null,
        startX: 0,
        startY: 0,
        animating: false,
        moved: false,
      };

      let recorder = null;
      let chunks = [];
      let animationHandle = 0;

      function setStatus(text) {
        statusEl.textContent = text;
      }

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function roundRectPath(x, y, w, h, r) {
        const radius = Math.min(r, w / 2, h / 2);
        ctx.beginPath();
        ctx.moveTo(x + radius, y);
        ctx.arcTo(x + w, y, x + w, y + h, radius);
        ctx.arcTo(x + w, y + h, x, y + h, radius);
        ctx.arcTo(x, y + h, x, y, radius);
        ctx.arcTo(x, y, x + w, y, radius);
        ctx.closePath();
      }

      function getSwipeLabelForCurrentFrame() {
        const swipeNumber = swipeOrder.indexOf(state.index) + 1;
        if (swipeNumber <= 0) return "";
        return "A".repeat(clamp(swipeNumber, 1, 3));
      }

      function drawSwipeText() {
        if (!state.dragging && Math.abs(state.dragX) < 8) return;

        const label = getSwipeLabelForCurrentFrame();
        if (!label) return;

        const alpha = Math.min(Math.abs(state.dragX) / 120, 1);
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.translate(stage.width / 2 + state.dragX * 0.15, 76);
        ctx.rotate((state.dragX / stage.width) * 0.35);
        ctx.strokeStyle = "#facc15";
        ctx.lineWidth = 5;
        ctx.strokeRect(-78, -26, 156, 52);
        ctx.fillStyle = "#facc15";
        ctx.font = "bold 34px sans-serif";
        ctx.textAlign = "center";
        ctx.fillText(label, 0, 11);
        ctx.restore();
      }

      function drawCoverImage(image, x, y, width, height) {
        const scale = Math.max(width / image.width, height / image.height);
        const drawW = image.width * scale;
        const drawH = image.height * scale;
        const drawX = x + (width - drawW) / 2;
        const drawY = y + (height - drawH) / 2;
        ctx.drawImage(image, drawX, drawY, drawW, drawH);
      }

      function drawFrame(frame, offsetX, offsetY, opacity) {
        const cardW = stage.width * 0.86;
        const cardH = stage.height * 0.86;

        ctx.save();
        ctx.globalAlpha = opacity;
        ctx.translate(stage.width / 2 + offsetX, stage.height / 2 + offsetY);
        ctx.rotate((offsetX / stage.width) * 0.25);

        roundRectPath(-cardW / 2, -cardH / 2, cardW, cardH, 24);
        ctx.clip();

        const uploadedImage = uploadedImages[frame.index];
        if (uploadedImage) {
          drawCoverImage(uploadedImage, -cardW / 2, -cardH / 2, cardW, cardH);
        } else {
          const grad = ctx.createLinearGradient(-cardW / 2, -cardH / 2, cardW / 2, cardH / 2);
          grad.addColorStop(0, frame.bg);
          grad.addColorStop(1, "#111827");
          ctx.fillStyle = grad;
          ctx.fillRect(-cardW / 2, -cardH / 2, cardW, cardH);

          ctx.fillStyle = "rgba(255,255,255,0.18)";
          ctx.beginPath();
          ctx.arc(0, -90, 70, 0, Math.PI * 2);
          ctx.fill();

          ctx.fillStyle = "rgba(255,255,255,0.2)";
          roundRectPath(-130, 70, 260, 120, 16);
          ctx.fill();
        }

        ctx.restore();
      }

      function queueRender() {
        cancelAnimationFrame(animationHandle);
        animationHandle = requestAnimationFrame(render);
      }

      function render() {
        ctx.clearRect(0, 0, stage.width, stage.height);
        ctx.fillStyle = "#f8fafc";
        ctx.fillRect(0, 0, stage.width, stage.height);

        if (state.index >= frames.length) {
          ctx.fillStyle = "#6b7280";
          ctx.font = "bold 24px sans-serif";
          ctx.textAlign = "center";
          ctx.fillText("すべて完了", stage.width / 2, stage.height / 2 - 8);
          ctx.font = "16px sans-serif";
          ctx.fillText("最初からボタンで再開できます", stage.width / 2, stage.height / 2 + 22);
          progressEl.textContent = `${frames.length} / ${frames.length} 完了`;
          setStatus("完了しました。7枚目はセレクトから再表示できます。");
          return;
        }

        const next = frames[state.index + 1];
        if (next) {
          drawFrame(next, 8, 10, 0.82);
        }

        const current = frames[state.index];
        drawFrame(current, state.dragX, state.dragY, 1);

        if (swipeFrameIndexes.has(state.index)) {
          drawSwipeText();
        }

        progressEl.textContent = `${state.index + 1} / ${frames.length}`;
        frameSelect.value = String(state.index);
        setStatus(
          swipeFrameIndexes.has(state.index)
            ? "この画面は左右スワイプで次へ進みます。"
            : "この画面はタップで次へ進みます。"
        );
      }

      function goNextFrame() {
        state.index += 1;
        state.dragX = 0;
        state.dragY = 0;
        state.animating = false;
        state.moved = false;
        queueRender();
      }

      function animateBack() {
        if (state.animating) return;
        state.animating = true;

        function step() {
          state.dragX *= 0.72;
          state.dragY *= 0.72;
          if (Math.abs(state.dragX) < 1 && Math.abs(state.dragY) < 1) {
            state.dragX = 0;
            state.dragY = 0;
            state.animating = false;
            queueRender();
            return;
          }
          queueRender();
          requestAnimationFrame(step);
        }

        requestAnimationFrame(step);
      }

      function animateOut(direction) {
        if (state.animating) return;
        state.animating = true;
        const targetX = direction > 0 ? stage.width * 1.25 : -stage.width * 1.25;

        function step() {
          state.dragX += (targetX - state.dragX) * 0.22;
          state.dragY *= 0.95;
          queueRender();

          if (Math.abs(targetX - state.dragX) < 4) {
            goNextFrame();
            return;
          }
          requestAnimationFrame(step);
        }

        requestAnimationFrame(step);
      }

      function onPointerDown(event) {
        if (state.index >= frames.length || state.animating || !swipeFrameIndexes.has(state.index)) return;
        state.dragging = true;
        state.moved = false;
        state.pointerId = event.pointerId;
        stage.setPointerCapture(event.pointerId);
        state.startX = event.clientX;
        state.startY = event.clientY;
      }

      function onPointerMove(event) {
        if (!state.dragging || event.pointerId !== state.pointerId) return;
        state.dragX = clamp(event.clientX - state.startX, -stage.width, stage.width);
        state.dragY = clamp(event.clientY - state.startY, -120, 120);
        state.moved = state.moved || Math.abs(state.dragX) > 6 || Math.abs(state.dragY) > 6;
        queueRender();
      }

      function onPointerUp(event) {
        if (!state.dragging || event.pointerId !== state.pointerId) return;
        state.dragging = false;
        stage.releasePointerCapture(event.pointerId);

        if (Math.abs(state.dragX) > stage.width * 0.23) {
          animateOut(state.dragX >= 0 ? 1 : -1);
        } else {
          animateBack();
        }
      }

      function onTap(event) {
        if (state.index >= frames.length || state.animating) return;
        if (swipeFrameIndexes.has(state.index)) return;
        if (event.pointerType === "mouse" && event.button !== 0) return;
        goNextFrame();
      }

      function pickRecorderMimeType() {
        const candidates = [
          "video/mp4;codecs=avc1.42E01E,mp4a.40.2",
          "video/mp4",
          "video/webm;codecs=vp9,opus",
          "video/webm;codecs=vp8,opus",
          "video/webm",
        ];

        for (const type of candidates) {
          if (MediaRecorder.isTypeSupported(type)) return type;
        }
        return "";
      }

      function startRecording() {
        if (!window.MediaRecorder) {
          setStatus("このブラウザは録画に対応していません。");
          return;
        }

        const mimeType = pickRecorderMimeType();
        if (!mimeType) {
          setStatus("利用可能な録画コーデックが見つかりませんでした。");
          return;
        }

        const stream = stage.captureStream(60);
        recorder = new MediaRecorder(stream, { mimeType, videoBitsPerSecond: 8_000_000 });
        chunks = [];

        recorder.ondataavailable = (event) => {
          if (event.data.size > 0) chunks.push(event.data);
        };

        recorder.onstop = () => {
          const isMp4 = mimeType.includes("mp4");
          const extension = isMp4 ? "mp4" : "webm";
          const blob = new Blob(chunks, { type: mimeType });
          const url = URL.createObjectURL(blob);
          downloadEl.href = url;
          downloadEl.download = `tinder2-recording.${extension}`;
          downloadEl.textContent = `録画をダウンロード (${extension.toUpperCase()})`;
          downloadEl.hidden = false;

          if (!isMp4) {
            setStatus("MP4未対応ブラウザのためWebMで保存しました。MP4対応ブラウザではMP4保存できます。");
          } else {
            setStatus("録画を停止しました。MP4をダウンロードできます。");
          }

          startRecBtn.disabled = false;
          stopRecBtn.disabled = true;
          recorder = null;
        };

        recorder.start(200);
        setStatus("録画中です。操作して動画を作成してください。");
        downloadEl.hidden = true;
        startRecBtn.disabled = true;
        stopRecBtn.disabled = false;
      }

      function stopRecording() {
        if (!recorder || recorder.state === "inactive") return;
        recorder.stop();
      }

      function resetTo(index) {
        state.index = index;
        state.dragX = 0;
        state.dragY = 0;
        state.dragging = false;
        state.pointerId = null;
        state.animating = false;
        state.moved = false;
        queueRender();
      }

      function loadImageFromFile(file, index) {
        return new Promise((resolve) => {
          if (!file) {
            if (uploadedObjectUrls[index]) {
              URL.revokeObjectURL(uploadedObjectUrls[index]);
              uploadedObjectUrls[index] = null;
            }
            uploadedImages[index] = null;
            resolve(null);
            return;
          }

          const url = URL.createObjectURL(file);
          const image = new Image();
          image.onload = () => {
            if (uploadedObjectUrls[index]) {
              URL.revokeObjectURL(uploadedObjectUrls[index]);
            }
            uploadedObjectUrls[index] = url;
            resolve(image);
          };
          image.onerror = () => {
            URL.revokeObjectURL(url);
            resolve(null);
          };
          image.src = url;
        });
      }

      async function handleImageUploadByIndex(event) {
        const index = Number(event.target.dataset.index);
        if (Number.isNaN(index)) return;
        const file = event.target.files?.[0] || null;
        const image = await loadImageFromFile(file, index);
        if (image) {
          setStatus(`${index + 1}枚目の画像を更新しました。`);
        } else {
          setStatus(`${index + 1}枚目の画像をクリアしました。`);
        }
        queueRender();
      }

      function clearAllImages() {
        for (let i = 0; i < frames.length; i += 1) {
          if (uploadedObjectUrls[i]) {
            URL.revokeObjectURL(uploadedObjectUrls[i]);
            uploadedObjectUrls[i] = null;
          }
          uploadedImages[i] = null;
        }

        uploadGrid.querySelectorAll("input[type='file']").forEach((input) => {
          input.value = "";
        });
        setStatus("すべての画像をクリアしました。");
        queueRender();
      }

      function buildUploadInputs() {
        frames.forEach((_, index) => {
          const row = document.createElement("div");
          row.className = "upload-row";

          const label = document.createElement("label");
          label.className = "upload-label";
          label.setAttribute("for", `imageUpload-${index}`);
          label.textContent = `${index + 1}枚目`;

          const input = document.createElement("input");
          input.id = `imageUpload-${index}`;
          input.className = "file-input";
          input.type = "file";
          input.accept = "image/*";
          input.dataset.index = String(index);
          input.addEventListener("change", handleImageUploadByIndex);

          row.append(label, input);
          uploadGrid.append(row);
        });
      }

      frames.forEach((frame, index) => {
        const option = document.createElement("option");
        option.value = String(index);
        option.textContent = `${index + 1}枚目`;
        frameSelect.append(option);
      });

      frameSelect.addEventListener("change", (event) => {
        const selected = Number(event.target.value);
        if (Number.isNaN(selected)) return;
        resetTo(clamp(selected, 0, frames.length - 1));
      });

      buildUploadInputs();
      clearImagesBtn.addEventListener("click", clearAllImages);
      resetBtn.addEventListener("click", () => resetTo(0));
      startRecBtn.addEventListener("click", startRecording);
      stopRecBtn.addEventListener("click", stopRecording);

      stage.addEventListener("pointerdown", onPointerDown);
      stage.addEventListener("pointermove", onPointerMove);
      stage.addEventListener("pointerup", onPointerUp);
      stage.addEventListener("pointercancel", onPointerUp);
      stage.addEventListener("click", onTap);

      resetTo(0);
    </script>
  </body>
</html>
