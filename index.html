<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>サイト一覧</title>
    <style>
      :root {
        color-scheme: light;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
        background: #f6f7fb;
        color: #1f2937;
      }

      main {
        width: min(760px, 100%);
        margin: 0 auto;
        padding: 24px 16px 40px;
      }

      h1 {
        margin: 0 0 16px;
        font-size: clamp(1.8rem, 5vw, 2.6rem);
      }

      p {
        margin: 0 0 20px;
        color: #4b5563;
        line-height: 1.7;
      }

      ul {
        list-style: none;
        padding: 0;
        margin: 0;
        display: grid;
        gap: 12px;
      }

      a {
        display: block;
        padding: 14px 16px;
        border-radius: 12px;
        background: white;
        text-decoration: none;
        color: #111827;
        border: 1px solid #e5e7eb;
        font-weight: 700;
      }

      a:hover {
        border-color: #f43f5e;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>サイト一覧</h1>
      <p>各サブディレクトリのページへ移動できます。</p>
      <ul>
        <li><a href="./DSL中間表現型/">オレキシン作動薬（DSL中間表現型）</a></li>
        <li><a href="./tinder/">Tinder風スワイプ & 録画</a></li>
        <li><a href="./tinder2/">Tinder2（クリックで A / AA / AAA）</a></li>
        <li><a href="./gatcha/">gatcha（Tinder2意識のガチャポンUI）</a></li>
        <li><a href="./固定フレームワーク選択型/">オレキシン作動薬（固定フレームワーク選択型）</a></li>
      </ul>
    </main>
  </body>
</html>
