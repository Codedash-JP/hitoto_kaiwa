<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>バナー生成</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@500;700;900&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        color-scheme: light;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Noto Sans JP", sans-serif;
        background: #f4f6fb;
        color: #1f2937;
      }

      main {
        width: min(1080px, 100%);
        margin: 0 auto;
        padding: 16px;
        display: grid;
        gap: 16px;
      }

      .panel {
        background: #fff;
        border: 1px solid #dbe2ea;
        border-radius: 14px;
        padding: 14px;
      }

      h1 {
        margin: 0 0 10px;
        font-size: clamp(1.4rem, 4vw, 2rem);
      }

      .grid {
        display: grid;
        gap: 10px;
      }

      .controls {
        grid-template-columns: 1fr;
      }

      label {
        display: grid;
        gap: 4px;
        font-size: 0.95rem;
      }

      input,
      textarea,
      select,
      button {
        font: inherit;
        padding: 9px 10px;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
      }

      textarea {
        min-height: 76px;
        resize: vertical;
      }

      input[type="color"] {
        padding: 2px;
        min-height: 42px;
      }

      button {
        background: #0f172a;
        color: #fff;
        border: none;
        font-weight: 700;
        cursor: pointer;
      }

      button:disabled {
        opacity: 0.6;
        cursor: wait;
      }

      .preview {
        overflow: auto;
      }

      canvas {
        max-width: 100%;
        height: auto;
        border-radius: 10px;
        border: 1px solid #dbe2ea;
        background: #e5e7eb;
      }

      .row {
        display: grid;
        gap: 10px;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .row3 {
        display: grid;
        gap: 10px;
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      #status {
        margin: 0;
        color: #334155;
        min-height: 1.6em;
        font-size: 0.92rem;
      }

      @media (min-width: 880px) {
        main {
          grid-template-columns: 380px 1fr;
          align-items: start;
        }

        .controls {
          position: sticky;
          top: 10px;
        }
      }

      @media (max-width: 560px) {
        .row,
        .row3 {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="panel controls grid">
        <h1>Gemini バナー生成</h1>
        <label>
          Gemini APIトークン
          <input id="apiKey" type="password" placeholder="AIza..." autocomplete="off" />
        </label>
        <label>
          画像生成プロンプト
          <textarea id="prompt" placeholder="例: 春のセール告知で、明るい街並みの背景"></textarea>
        </label>
        <label>
          モデル
          <select id="model">
            <option value="gemini-2.5-flash-image">gemini-2.5-flash-image</option>
            <option value="gemini-2.5-flash-image-preview">gemini-2.5-flash-image-preview</option>
            <option value="gemini-2.5-pro-image-preview">gemini-2.5-pro-image-preview</option>
            <option value="gemini-2.0-flash-preview-image-generation">gemini-2.0-flash-preview-image-generation</option>
            <option value="gemini-2.0-flash-exp-image-generation">gemini-2.0-flash-exp-image-generation</option>
            <option value="gemini-3.1-flash-image-preview">gemini-3.1-flash-image-preview</option>
          </select>
        </label>
        <div class="row">
          <button id="insertImageBtn" type="button">画像を差し込み</button>
          <input id="imageFile" type="file" accept="image/*" hidden />
        </div>
        <p style="margin: 0; font-size: 0.9rem; color: #475569">
          外部画像はこのページ上で <strong>Ctrl + V / ⌘ + V</strong> で貼り付け可能です（クリップボード画像のみ）。
        </p>
        <div class="row">
          <label>
            比率
            <select id="aspectRatio">
              <option>1:1</option>
              <option>4:3</option>
              <option selected>16:9</option>
              <option>9:16</option>
            </select>
          </label>
          <label>
            帯の色
            <input id="bandColor" type="color" value="#ffd400" />
          </label>
        </div>
        <div class="row3">
          <label>
            帯の高さ(%)
            <input id="bandHeight" type="number" min="8" max="60" value="24" />
          </label>
          <label>
            帯の縦位置(%)
            <input id="bandTop" type="number" min="0" max="90" value="62" />
          </label>
          <label>
            帯文字サイズ(px)
            <input id="bandFontSize" type="number" min="20" max="160" value="70" />
          </label>
        </div>
        <label>
          上側テキスト（改行で複数段）
          <textarea id="topText" placeholder="WHITE TEXT\n複数行OK"></textarea>
        </label>
        <div class="row">
          <label>
            上側文字サイズ(px)
            <input id="topFontSize" type="number" min="16" max="120" value="52" />
          </label>
          <label>
            上側文字位置(%)
            <input id="topY" type="number" min="5" max="70" value="24" />
          </label>
        </div>
        <label>
          帯テキスト（改行で複数段）
          <textarea id="bandText" placeholder="SALE\n50% OFF"></textarea>
        </label>

        <div class="row">
          <button id="generateBtn" type="button">画像を生成</button>
          <button id="downloadBtn" type="button">PNGをダウンロード</button>
        </div>
        <p id="status"></p>
      </section>

      <section class="panel preview">
        <canvas id="canvas" width="1344" height="768"></canvas>
      </section>
    </main>

    <script>
      const el = {
        apiKey: document.getElementById("apiKey"),
        prompt: document.getElementById("prompt"),
        model: document.getElementById("model"),
        aspectRatio: document.getElementById("aspectRatio"),
        bandColor: document.getElementById("bandColor"),
        bandHeight: document.getElementById("bandHeight"),
        bandTop: document.getElementById("bandTop"),
        bandFontSize: document.getElementById("bandFontSize"),
        topText: document.getElementById("topText"),
        topFontSize: document.getElementById("topFontSize"),
        topY: document.getElementById("topY"),
        bandText: document.getElementById("bandText"),
        generateBtn: document.getElementById("generateBtn"),
        downloadBtn: document.getElementById("downloadBtn"),
        insertImageBtn: document.getElementById("insertImageBtn"),
        imageFile: document.getElementById("imageFile"),
        status: document.getElementById("status"),
        canvas: document.getElementById("canvas"),
      };

      const ctx = el.canvas.getContext("2d");
      let generatedImage = null;

      const ratioToSize = {
        "1:1": [1024, 1024],
        "4:3": [1184, 864],
        "16:9": [1344, 768],
        "9:16": [768, 1344],
      };

      function setStatus(message) {
        el.status.textContent = message;
      }

      function applyImageFile(file) {
        if (!file || !file.type.startsWith("image/")) {
          setStatus("画像ファイルを選択または貼り付けしてください。");
          return;
        }

        const reader = new FileReader();
        reader.onload = () => {
          const img = new Image();
          img.onload = () => {
            generatedImage = img;
            redrawCanvas();
            setStatus("画像を差し込みました。テキストや帯色を調整できます。");
          };
          img.onerror = () => {
            setStatus("画像の読み込みに失敗しました。別の画像を試してください。");
          };
          img.src = reader.result;
        };
        reader.onerror = () => {
          setStatus("画像ファイルの読み込みに失敗しました。");
        };
        reader.readAsDataURL(file);
      }

      function splitLines(text) {
        return text
          .split("\n")
          .map((line) => line.trim())
          .filter(Boolean);
      }

      function fitCanvasByRatio() {
        const [w, h] = ratioToSize[el.aspectRatio.value] || ratioToSize["16:9"];
        el.canvas.width = w;
        el.canvas.height = h;
      }

      function drawMultiline(lines, x, startY, lineHeight, color, sizePx) {
        ctx.fillStyle = color;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.font = `900 ${sizePx}px \"Noto Sans JP\", sans-serif`;

        lines.forEach((line, index) => {
          ctx.fillText(line, x, startY + index * lineHeight);
        });
      }

      function redrawCanvas() {
        fitCanvasByRatio();
        const w = el.canvas.width;
        const h = el.canvas.height;

        if (generatedImage) {
          ctx.drawImage(generatedImage, 0, 0, w, h);
        } else {
          ctx.fillStyle = "#dbe2ea";
          ctx.fillRect(0, 0, w, h);
        }

        const bandTop = (Number(el.bandTop.value) / 100) * h;
        const bandHeight = (Number(el.bandHeight.value) / 100) * h;

        ctx.fillStyle = el.bandColor.value;
        ctx.fillRect(0, bandTop, w, bandHeight);

        const topLines = splitLines(el.topText.value);
        const bandLines = splitLines(el.bandText.value);

        const topFontSize = Number(el.topFontSize.value) || 52;
        const topLineHeight = topFontSize * 1.2;
        const topStartY = (Number(el.topY.value) / 100) * h;

        const bandFontSize = Number(el.bandFontSize.value) || 70;
        const bandLineHeight = bandFontSize * 1.16;
        const bandStartY = bandTop + bandHeight / 2 - ((bandLines.length - 1) * bandLineHeight) / 2;

        if (topLines.length) {
          drawMultiline(topLines, w / 2, topStartY, topLineHeight, "#ffffff", topFontSize);
        }

        if (bandLines.length) {
          drawMultiline(bandLines, w / 2, bandStartY, bandLineHeight, "#c40000", bandFontSize);
        }
      }

      async function generateImage() {
        const key = el.apiKey.value.trim();
        const prompt = el.prompt.value.trim();

        if (!key || !prompt) {
          setStatus("APIトークンとプロンプトを入力してください。");
          return;
        }

        el.generateBtn.disabled = true;
        setStatus("Geminiで画像生成中...");

        try {
          const response = await fetch(
            `https://generativelanguage.googleapis.com/v1beta/models/${encodeURIComponent(el.model.value)}:generateContent`,
            {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
                "x-goog-api-key": key,
              },
              body: JSON.stringify({
                contents: [
                  {
                    parts: [{ text: prompt }],
                  },
                ],
                generationConfig: {
                  responseModalities: ["IMAGE", "TEXT"],
                  imageConfig: {
                    aspectRatio: el.aspectRatio.value,
                  },
                },
              }),
            },
          );

          const data = await response.json();

          if (!response.ok) {
            const message = data?.error?.message || "画像生成に失敗しました。";
            throw new Error(message);
          }

          const parts = data?.candidates?.[0]?.content?.parts || [];
          const imagePart = parts.find((part) => part.inlineData?.data);

          if (!imagePart) {
            throw new Error("画像データが返されませんでした。モデルまたはプロンプトを変更してください。");
          }

          const mimeType = imagePart.inlineData.mimeType || "image/png";
          const dataUrl = `data:${mimeType};base64,${imagePart.inlineData.data}`;

          const img = new Image();
          img.onload = () => {
            generatedImage = img;
            redrawCanvas();
            setStatus("画像生成が完了しました。テキストや帯色を調整できます。");
          };
          img.onerror = () => {
            setStatus("画像データの読み込みに失敗しました。");
          };
          img.src = dataUrl;
        } catch (error) {
          setStatus(`エラー: ${error.message}`);
        } finally {
          el.generateBtn.disabled = false;
        }
      }

      function downloadPng() {
        redrawCanvas();
        const link = document.createElement("a");
        link.href = el.canvas.toDataURL("image/png");
        link.download = `banner-${Date.now()}.png`;
        link.click();
      }

      [
        el.aspectRatio,
        el.bandColor,
        el.bandHeight,
        el.bandTop,
        el.bandFontSize,
        el.topText,
        el.topFontSize,
        el.topY,
        el.bandText,
      ].forEach((node) => {
        node.addEventListener("input", redrawCanvas);
      });

      el.generateBtn.addEventListener("click", generateImage);
      el.downloadBtn.addEventListener("click", downloadPng);
      el.insertImageBtn.addEventListener("click", () => el.imageFile.click());
      el.imageFile.addEventListener("change", () => {
        const file = el.imageFile.files?.[0];
        applyImageFile(file);
        el.imageFile.value = "";
      });

      document.addEventListener("paste", (event) => {
        const items = Array.from(event.clipboardData?.items || []);
        const imageItem = items.find((item) => item.type.startsWith("image/"));

        if (!imageItem) {
          return;
        }

        const file = imageItem.getAsFile();
        if (!file) {
          setStatus("クリップボード画像の取得に失敗しました。");
          return;
        }

        event.preventDefault();
        applyImageFile(file);
      });

      redrawCanvas();
    </script>
  </body>
</html>
