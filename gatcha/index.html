<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>gatcha - Tinder2意識ガチャポン</title>
    <style>
      :root {
        color-scheme: light;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
        background: radial-gradient(circle at top, #ffe7ef, #ffe3f3 35%, #eef6ff 100%);
        color: #172033;
      }

      .app {
        width: min(820px, 100%);
        margin: 0 auto;
        min-height: 100vh;
        padding: 16px;
        display: grid;
        gap: 12px;
      }

      h1 {
        margin: 0;
        font-size: clamp(1.35rem, 5vw, 2rem);
      }

      .controls {
        background: #ffffffde;
        border: 1px solid #f9a8d4;
        border-radius: 16px;
        padding: 12px;
        display: grid;
        gap: 10px;
      }

      .control-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
      }

      .upload-grid {
        display: grid;
        gap: 8px;
      }

      .upload-row {
        display: grid;
        grid-template-columns: 64px minmax(0, 1fr);
        align-items: center;
        gap: 8px;
      }

      .upload-label {
        font-weight: 700;
        color: #9d174d;
        font-size: 0.9rem;
      }

      .file-input {
        max-width: 100%;
      }

      button,
      select {
        border: none;
        border-radius: 999px;
        padding: 10px 14px;
        font-weight: 700;
        font-size: 0.95rem;
      }

      select {
        border: 1px solid #f9a8d4;
        background: #fff;
      }

      button {
        cursor: pointer;
      }

      .spin {
        background: #ec4899;
        color: #fff;
      }

      .start {
        background: #0f766e;
        color: #fff;
      }

      .stop {
        background: #111827;
        color: #fff;
      }

      .reset {
        background: #e5e7eb;
        color: #111827;
      }

      .stage-wrap {
        display: grid;
        place-items: center;
        background: #ffffffbf;
        border: 1px solid #bfdbfe;
        border-radius: 18px;
        padding: 12px;
      }

      canvas {
        width: min(100%, 460px);
        aspect-ratio: 3 / 4;
        border-radius: 18px;
        touch-action: none;
        background: #fff;
      }

      .status,
      .tips,
      .progress {
        margin: 0;
        font-size: 0.92rem;
        color: #374151;
      }

      .progress {
        color: #be185d;
        font-weight: 700;
      }

      .download-link {
        display: inline-block;
        font-size: 0.92rem;
        color: #be185d;
        word-break: break-all;
      }
    </style>
  </head>
  <body>
    <main class="app">
      <h1>gatcha (Tinder2意識)</h1>

      <section class="controls">
        <div class="control-row">
          <span>画像アップロード(順番どおりに排出):</span>
        </div>
        <div id="uploadGrid" class="upload-grid" aria-label="番号別画像アップロード"></div>

        <div class="control-row">
          <button id="spinBtn" class="spin" type="button">ガチャを回す（次の1枚）</button>
          <button id="resetBtn" class="reset" type="button">最初から</button>
          <button id="clearImagesBtn" class="reset" type="button">画像をクリア</button>
        </div>

        <div class="control-row">
          <label for="frameSelect">表示位置へ移動:</label>
          <select id="frameSelect" aria-label="表示開始フレーム"></select>
        </div>

        <div class="control-row">
          <button id="startRec" class="start" type="button">録画開始</button>
          <button id="stopRec" class="stop" type="button" disabled>録画終了</button>
        </div>

        <p id="progress" class="progress"></p>
        <p id="status" class="status"></p>
        <a id="download" class="download-link" hidden></a>
      </section>

      <section class="stage-wrap">
        <canvas id="stage" width="540" height="720" aria-label="ガチャポンステージ"></canvas>
      </section>

      <p class="tips">クリック（またはタップ）でガチャが1回回り、写真が順番に1枚ずつ出てきます。録画は Tinder2 より高い 90fps でキャプチャします（ブラウザ依存）。</p>
    </main>

    <script>
      const stage = document.getElementById("stage");
      const ctx = stage.getContext("2d");
      const uploadGrid = document.getElementById("uploadGrid");
      const clearImagesBtn = document.getElementById("clearImagesBtn");
      const frameSelect = document.getElementById("frameSelect");
      const resetBtn = document.getElementById("resetBtn");
      const spinBtn = document.getElementById("spinBtn");
      const startRecBtn = document.getElementById("startRec");
      const stopRecBtn = document.getElementById("stopRec");
      const progressEl = document.getElementById("progress");
      const statusEl = document.getElementById("status");
      const downloadEl = document.getElementById("download");

      const frames = ["#fb7185", "#f59e0b", "#10b981", "#3b82f6", "#a855f7", "#ec4899", "#ef4444"].map(
        (bg, i) => ({ bg, index: i })
      );

      const uploadedImages = new Array(frames.length).fill(null);
      const uploadedObjectUrls = new Array(frames.length).fill(null);

      const state = {
        index: 0,
        phase: "idle",
        capsuleY: -220,
        capsuleRotation: 0,
        revealProgress: 0,
        machineShake: 0,
        spinReady: true,
      };

      let animationId = 0;
      let recorder = null;
      let chunks = [];

      function setStatus(text) {
        statusEl.textContent = text;
      }

      function clamp(v, min, max) {
        return Math.max(min, Math.min(max, v));
      }

      function roundRectPath(x, y, w, h, r) {
        const radius = Math.min(r, w / 2, h / 2);
        ctx.beginPath();
        ctx.moveTo(x + radius, y);
        ctx.arcTo(x + w, y, x + w, y + h, radius);
        ctx.arcTo(x + w, y + h, x, y + h, radius);
        ctx.arcTo(x, y + h, x, y, radius);
        ctx.arcTo(x, y, x + w, y, radius);
        ctx.closePath();
      }

      function drawCoverImage(image, x, y, width, height) {
        const scale = Math.max(width / image.width, height / image.height);
        const drawW = image.width * scale;
        const drawH = image.height * scale;
        const drawX = x + (width - drawW) / 2;
        const drawY = y + (height - drawH) / 2;
        ctx.drawImage(image, drawX, drawY, drawW, drawH);
      }

      function drawMachine() {
        const wobble = Math.sin(performance.now() * 0.02) * state.machineShake;
        ctx.save();
        ctx.translate(stage.width / 2 + wobble, stage.height / 2 + 30);

        const bodyW = stage.width * 0.62;
        const bodyH = stage.height * 0.72;

        const outer = ctx.createLinearGradient(-bodyW / 2, -bodyH / 2, bodyW / 2, bodyH / 2);
        outer.addColorStop(0, "#f472b6");
        outer.addColorStop(1, "#db2777");
        ctx.fillStyle = outer;
        roundRectPath(-bodyW / 2, -bodyH / 2, bodyW, bodyH, 40);
        ctx.fill();

        ctx.fillStyle = "#fff";
        ctx.beginPath();
        ctx.arc(0, -80, 130, 0, Math.PI * 2);
        ctx.fill();

        ctx.strokeStyle = "#f9a8d4";
        ctx.lineWidth = 8;
        ctx.beginPath();
        ctx.arc(0, -80, 130, 0, Math.PI * 2);
        ctx.stroke();

        const knobGrad = ctx.createLinearGradient(-40, 96, 40, 152);
        knobGrad.addColorStop(0, "#fbbf24");
        knobGrad.addColorStop(1, "#f59e0b");
        ctx.fillStyle = knobGrad;
        roundRectPath(-56, 96, 112, 56, 16);
        ctx.fill();

        ctx.fillStyle = "#7c2d12";
        ctx.beginPath();
        ctx.arc(0, 124, 14, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "#fee2e2";
        roundRectPath(-100, 175, 200, 80, 14);
        ctx.fill();

        ctx.restore();
      }

      function drawPhotoCard(index, centerX, centerY, scaleRate, alpha) {
        const frame = frames[index];
        const cardW = 220 * scaleRate;
        const cardH = 300 * scaleRate;

        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.translate(centerX, centerY);
        ctx.rotate(Math.sin(performance.now() * 0.005 + index) * 0.03);

        ctx.shadowColor = "rgba(0,0,0,0.2)";
        ctx.shadowBlur = 20;
        ctx.shadowOffsetY = 8;

        roundRectPath(-cardW / 2, -cardH / 2, cardW, cardH, 22);
        ctx.clip();

        const image = uploadedImages[index];
        if (image) {
          drawCoverImage(image, -cardW / 2, -cardH / 2, cardW, cardH);
        } else {
          const grad = ctx.createLinearGradient(-cardW / 2, -cardH / 2, cardW / 2, cardH / 2);
          grad.addColorStop(0, frame.bg);
          grad.addColorStop(1, "#111827");
          ctx.fillStyle = grad;
          ctx.fillRect(-cardW / 2, -cardH / 2, cardW, cardH);

          ctx.fillStyle = "rgba(255,255,255,0.22)";
          ctx.beginPath();
          ctx.arc(0, -52, 50, 0, Math.PI * 2);
          ctx.fill();
        }

        ctx.restore();
      }

      function drawCapsule() {
        const x = stage.width / 2;
        const y = state.capsuleY;

        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(state.capsuleRotation);

        const r = 54;

        ctx.beginPath();
        ctx.arc(0, 0, r, 0, Math.PI * 2);
        ctx.clip();

        const topGrad = ctx.createLinearGradient(0, -r, 0, 0);
        topGrad.addColorStop(0, "#93c5fd");
        topGrad.addColorStop(1, "#60a5fa");
        ctx.fillStyle = topGrad;
        ctx.fillRect(-r, -r, r * 2, r);

        const bottomGrad = ctx.createLinearGradient(0, 0, 0, r);
        bottomGrad.addColorStop(0, "#fecdd3");
        bottomGrad.addColorStop(1, "#fda4af");
        ctx.fillStyle = bottomGrad;
        ctx.fillRect(-r, 0, r * 2, r);

        ctx.restore();
      }

      function drawDispenserPhoto() {
        if (state.index === 0 && state.phase === "idle") return;
        const shownIndex = clamp(state.index - 1, 0, frames.length - 1);
        const p = clamp(state.revealProgress, 0, 1);
        const y = stage.height - 165 - (1 - p) * 90;
        const scale = 0.84 + p * 0.16;
        drawPhotoCard(shownIndex, stage.width / 2, y, scale, 0.28 + p * 0.72);
      }

      function drawDoneMessage() {
        if (state.index < frames.length) return;
        ctx.fillStyle = "rgba(17,24,39,0.75)";
        roundRectPath(90, 34, stage.width - 180, 72, 14);
        ctx.fill();
        ctx.fillStyle = "#fff";
        ctx.font = "bold 24px sans-serif";
        ctx.textAlign = "center";
        ctx.fillText("全て排出しました", stage.width / 2, 80);
      }

      function render() {
        ctx.clearRect(0, 0, stage.width, stage.height);
        const bg = ctx.createLinearGradient(0, 0, 0, stage.height);
        bg.addColorStop(0, "#fdf2f8");
        bg.addColorStop(1, "#eff6ff");
        ctx.fillStyle = bg;
        ctx.fillRect(0, 0, stage.width, stage.height);

        drawMachine();
        drawDispenserPhoto();
        if (state.phase !== "idle" && state.phase !== "finished") {
          drawCapsule();
        }
        drawDoneMessage();
      }

      function updateProgress() {
        const shown = clamp(state.index, 0, frames.length);
        progressEl.textContent = `${shown} / ${frames.length} 枚排出`;
        frameSelect.value = String(clamp(state.index, 0, frames.length - 1));
      }

      function setIdleMessage() {
        if (state.index >= frames.length) {
          setStatus("排出完了です。最初からボタンで再開できます。");
          return;
        }
        setStatus("ガチャを回すボタンまたはステージのタップで、次の写真を出せます。");
      }

      function queueRender() {
        cancelAnimationFrame(animationId);
        animationId = requestAnimationFrame(render);
      }

      function spinOnce() {
        if (!state.spinReady || state.index >= frames.length) return;
        state.spinReady = false;
        state.phase = "drop";
        state.capsuleY = -140;
        state.capsuleRotation = 0;
        state.revealProgress = 0;
        state.machineShake = 5;

        const start = performance.now();
        const dropDuration = 520;
        const revealDuration = 520;

        function step(now) {
          const elapsed = now - start;

          if (elapsed < dropDuration) {
            const t = elapsed / dropDuration;
            const eased = 1 - Math.pow(1 - t, 3);
            state.capsuleY = -140 + (stage.height - 250 + 140) * eased;
            state.capsuleRotation = t * Math.PI * 3.3;
            state.machineShake = 5 * (1 - t);
            queueRender();
            requestAnimationFrame(step);
            return;
          }

          const revealElapsed = elapsed - dropDuration;
          if (revealElapsed < revealDuration) {
            const t = revealElapsed / revealDuration;
            const eased = 1 - Math.pow(1 - t, 3);
            state.phase = "reveal";
            state.capsuleY = stage.height - 250 + t * 110;
            state.capsuleRotation += 0.05;
            state.revealProgress = eased;
            queueRender();
            requestAnimationFrame(step);
            return;
          }

          state.phase = "idle";
          state.revealProgress = 1;
          state.capsuleY = stage.height + 200;
          state.machineShake = 0;
          state.index += 1;

          if (state.index >= frames.length) {
            state.phase = "finished";
          }

          state.spinReady = true;
          updateProgress();
          setIdleMessage();
          queueRender();
        }

        requestAnimationFrame(step);
      }

      function resetTo(index) {
        state.index = clamp(index, 0, frames.length);
        state.phase = state.index >= frames.length ? "finished" : "idle";
        state.capsuleY = -220;
        state.capsuleRotation = 0;
        state.revealProgress = state.index > 0 ? 1 : 0;
        state.machineShake = 0;
        state.spinReady = true;
        updateProgress();
        setIdleMessage();
        queueRender();
      }

      function pickRecorderMimeType() {
        const candidates = [
          "video/mp4;codecs=avc1.42E01E,mp4a.40.2",
          "video/mp4",
          "video/webm;codecs=vp9,opus",
          "video/webm;codecs=vp8,opus",
          "video/webm",
        ];

        for (const type of candidates) {
          if (MediaRecorder.isTypeSupported(type)) return type;
        }
        return "";
      }

      function startRecording() {
        if (!window.MediaRecorder) {
          setStatus("このブラウザは録画に対応していません。");
          return;
        }

        const mimeType = pickRecorderMimeType();
        if (!mimeType) {
          setStatus("利用可能な録画コーデックが見つかりませんでした。");
          return;
        }

        const stream = stage.captureStream(90);
        recorder = new MediaRecorder(stream, { mimeType, videoBitsPerSecond: 12_000_000 });
        chunks = [];

        recorder.ondataavailable = (event) => {
          if (event.data.size > 0) chunks.push(event.data);
        };

        recorder.onstop = () => {
          const isMp4 = mimeType.includes("mp4");
          const extension = isMp4 ? "mp4" : "webm";
          const blob = new Blob(chunks, { type: mimeType });
          const url = URL.createObjectURL(blob);
          downloadEl.href = url;
          downloadEl.download = `tinder2-gacha-recording.${extension}`;
          downloadEl.textContent = `録画をダウンロード (${extension.toUpperCase()})`;
          downloadEl.hidden = false;

          if (!isMp4) {
            setStatus("MP4未対応ブラウザのためWebMで保存しました。MP4対応ブラウザではMP4保存できます。");
          } else {
            setStatus("録画停止しました。MP4をダウンロードできます。");
          }

          startRecBtn.disabled = false;
          stopRecBtn.disabled = true;
          recorder = null;
        };

        recorder.start(150);
        setStatus("録画中です。ガチャを回して動画を作成してください。");
        downloadEl.hidden = true;
        startRecBtn.disabled = true;
        stopRecBtn.disabled = false;
      }

      function stopRecording() {
        if (!recorder || recorder.state === "inactive") return;
        recorder.stop();
      }

      function loadImageFromFile(file, index) {
        return new Promise((resolve) => {
          if (!file) {
            if (uploadedObjectUrls[index]) {
              URL.revokeObjectURL(uploadedObjectUrls[index]);
              uploadedObjectUrls[index] = null;
            }
            uploadedImages[index] = null;
            resolve(null);
            return;
          }

          const url = URL.createObjectURL(file);
          const image = new Image();
          image.onload = () => {
            if (uploadedObjectUrls[index]) {
              URL.revokeObjectURL(uploadedObjectUrls[index]);
            }
            uploadedObjectUrls[index] = url;
            uploadedImages[index] = image;
            resolve(image);
          };
          image.onerror = () => {
            URL.revokeObjectURL(url);
            uploadedImages[index] = null;
            resolve(null);
          };
          image.src = url;
        });
      }

      async function handleImageUploadByIndex(event) {
        const index = Number(event.target.dataset.index);
        if (Number.isNaN(index)) return;
        const file = event.target.files?.[0] || null;
        const image = await loadImageFromFile(file, index);
        if (image) {
          setStatus(`${index + 1}枚目の画像を更新しました。`);
        } else {
          setStatus(`${index + 1}枚目の画像をクリアしました。`);
        }
        queueRender();
      }

      function clearAllImages() {
        for (let i = 0; i < frames.length; i += 1) {
          if (uploadedObjectUrls[i]) {
            URL.revokeObjectURL(uploadedObjectUrls[i]);
            uploadedObjectUrls[i] = null;
          }
          uploadedImages[i] = null;
        }

        uploadGrid.querySelectorAll("input[type='file']").forEach((input) => {
          input.value = "";
        });
        setStatus("すべての画像をクリアしました。");
        queueRender();
      }

      function buildUploadInputs() {
        frames.forEach((_, index) => {
          const row = document.createElement("div");
          row.className = "upload-row";

          const label = document.createElement("label");
          label.className = "upload-label";
          label.setAttribute("for", `imageUpload-${index}`);
          label.textContent = `${index + 1}枚目`;

          const input = document.createElement("input");
          input.id = `imageUpload-${index}`;
          input.className = "file-input";
          input.type = "file";
          input.accept = "image/*";
          input.dataset.index = String(index);
          input.addEventListener("change", handleImageUploadByIndex);

          row.append(label, input);
          uploadGrid.append(row);
        });
      }

      frames.forEach((frame, index) => {
        const option = document.createElement("option");
        option.value = String(index);
        option.textContent = `${index + 1}枚目`;
        frameSelect.append(option);
      });

      frameSelect.addEventListener("change", (event) => {
        const selected = Number(event.target.value);
        if (Number.isNaN(selected)) return;
        resetTo(selected);
      });

      buildUploadInputs();
      resetBtn.addEventListener("click", () => resetTo(0));
      spinBtn.addEventListener("click", spinOnce);
      clearImagesBtn.addEventListener("click", clearAllImages);
      startRecBtn.addEventListener("click", startRecording);
      stopRecBtn.addEventListener("click", stopRecording);

      stage.addEventListener("click", spinOnce);
      stage.addEventListener("pointerdown", (event) => {
        if (event.pointerType === "touch") {
          spinOnce();
        }
      });

      resetTo(0);
    </script>
  </body>
</html>
